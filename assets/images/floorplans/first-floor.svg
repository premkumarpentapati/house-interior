<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="DM Sans, Arial, sans-serif">
  <rect width="1000" height="720" fill="#FAF6EE"/>
  <text x="40" y="42" font-size="22" fill="#2C2416" font-weight="600">First Floor Plan — Assumed Working Layout</text>
  <text x="40" y="68" font-size="12" fill="#8A7A65">Typical Indian duplex · ~1,250 sq.ft · North ↑ · All beds oriented South → North</text>
  <rect x="60" y="100" width="880" height="560" fill="#F5EDE0" stroke="#2C2416" stroke-width="6"/>
  <!-- Master -->
  <rect x="70" y="110" width="400" height="320" fill="#EDE0C8" stroke="#9A6C4A" stroke-width="2"/>
  <text x="270" y="230" text-anchor="middle" font-size="16" fill="#2C2416">MASTER BEDROOM</text>
  <text x="270" y="252" text-anchor="middle" font-size="11" fill="#8A7A65">16' × 14' · Bed S→N</text>
  <rect x="220" y="280" width="100" height="70" fill="#FAF6EE" stroke="#C66B4A" stroke-width="2"/>
  <text x="270" y="320" text-anchor="middle" font-size="10" fill="#C66B4A">BED ↑N</text>
  <!-- Master ensuite -->
  <rect x="70" y="430" width="200" height="220" fill="#D6C6A8" stroke="#9A6C4A" stroke-width="2"/>
  <text x="170" y="540" text-anchor="middle" font-size="13" fill="#2C2416">MASTER</text>
  <text x="170" y="560" text-anchor="middle" font-size="13" fill="#2C2416">ENSUITE</text>
  <!-- Walk-in / Wardrobe -->
  <rect x="270" y="430" width="200" height="220" fill="#E8DCC8" stroke="#9A6C4A" stroke-width="2"/>
  <text x="370" y="545" text-anchor="middle" font-size="13" fill="#2C2416">WALK-IN</text>
  <text x="370" y="565" text-anchor="middle" font-size="12" fill="#8A7A65">WARDROBE</text>
  <!-- Family Lounge -->
  <rect x="470" y="110" width="250" height="220" fill="#EDE0C8" stroke="#9A6C4A" stroke-width="2"/>
  <text x="595" y="210" text-anchor="middle" font-size="15" fill="#2C2416">FAMILY LOUNGE</text>
  <text x="595" y="232" text-anchor="middle" font-size="11" fill="#8A7A65">12' × 11'</text>
  <!-- Stair -->
  <rect x="720" y="110" width="120" height="220" fill="#C4AD84" stroke="#9A6C4A" stroke-width="2"/>
  <text x="780" y="220" text-anchor="middle" font-size="13" fill="#2C2416">STAIR</text>
  <!-- Balcony -->
  <rect x="840" y="110" width="90" height="220" fill="#E8F0E4" stroke="#7A8F6E" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="885" y="220" text-anchor="middle" font-size="11" fill="#5A6F52" transform="rotate(-90 885 220)">BALCONY</text>
  <!-- Bedroom 2 -->
  <rect x="470" y="330" width="250" height="320" fill="#EDE0C8" stroke="#9A6C4A" stroke-width="2"/>
  <text x="595" y="460" text-anchor="middle" font-size="15" fill="#2C2416">BEDROOM 2</text>
  <text x="595" y="482" text-anchor="middle" font-size="11" fill="#8A7A65">12' × 11' · Bed S→N</text>
  <rect x="545" y="510" width="100" height="60" fill="#FAF6EE" stroke="#C66B4A" stroke-width="2"/>
  <text x="595" y="545" text-anchor="middle" font-size="10" fill="#C66B4A">BED ↑N</text>
  <!-- Bedroom 3 / Study -->
  <rect x="720" y="330" width="210" height="200" fill="#E8DCC8" stroke="#9A6C4A" stroke-width="2"/>
  <text x="825" y="420" text-anchor="middle" font-size="14" fill="#2C2416">BEDROOM 3</text>
  <text x="825" y="442" text-anchor="middle" font-size="11" fill="#8A7A65">/ STUDY · Bed S→N</text>
  <rect x="775" y="460" width="100" height="50" fill="#FAF6EE" stroke="#C66B4A" stroke-width="2"/>
  <text x="825" y="490" text-anchor="middle" font-size="10" fill="#C66B4A">BED ↑N</text>
  <!-- Common bath -->
  <rect x="720" y="530" width="210" height="120" fill="#D6C6A8" stroke="#9A6C4A" stroke-width="2"/>
  <text x="825" y="595" text-anchor="middle" font-size="13" fill="#2C2416">COMMON BATH</text>
  <g transform="translate(920,90)">
    <polygon points="0,-22 8,10 -8,10" fill="#2C2416"/>
    <text x="0" y="28" text-anchor="middle" font-size="11" fill="#2C2416">N</text>
  </g>
  <text x="40" y="700" font-size="10" fill="#8A7A65">Beds locked South→North per brief · No structural relocation proposed · Balcony retained for light &amp; ventilation</text>
</svg>